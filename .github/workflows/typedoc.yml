name: Publish TypeDoc

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_ROOT: "./api-docs"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (v3) branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable Corepack
        run: corepack enable

      - name: Install packages (v3)
        run: corepack yarn install --immutable

      - name: Build (v3)
        run: corepack yarn build

      - name: Generate v3 api docs
        run: |
          mkdir -p "$BUILD_ROOT/v3"
          npx typedoc --options typedoc.json --out "$BUILD_ROOT/v3" --logLevel Error

      # --- Build docs for main branch into /main (or /v2) ---

      - name: Checkout main branch into subfolder
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Install packages (main)
        working-directory: main
        run: yarn install

      - name: Build (main)
        working-directory: main
        run: yarn build

      - name: Generate main api docs
        working-directory: main
        run: |
          mkdir -p "../$BUILD_ROOT/main"
          npx typedoc --options typedoc.json --out "../$BUILD_ROOT/main" --logLevel Error

      # Optional: index page for both v3 and main branches
      - name: Create index.html
        run: |
          mkdir -p "$BUILD_ROOT"
          cp ./docs/typedoc/index.html "$BUILD_ROOT/index.html"

      - name: Setup pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (combined docs)
        uses: actions/upload-pages-artifact@v4
        with:
          # IMPORTANT: single artifact with both /v3 and /main
          path: ${{ env.BUILD_ROOT }}
          # omit name → default "github-pages" which deploy-pages expects

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4